<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAES ESIME - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="login-container">
        <h1>SAES Distribuido</h1>
        <p>Ingresa tus credenciales institucionales</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" required placeholder="Ej. juan_perez">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="********">
            </div>

            <button type="submit" class="btn-guinda" id="btnSubmit">Iniciar Sesión</button>
            <div id="mensajeError">Usuario o contraseña incorrectos.</div>
        </form>
    </div>

    <script src="js/api_config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
